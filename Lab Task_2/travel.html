    <main class="container my-5 flex-grow-1">
        <div class="text-center mb-4">
            <h2 class="text-primary fw-bold display-5">Travel Destinations</h2>
            <p class="text-muted lead">Places I've visited and loved.</p>
        </div>

        <div id="travelCarousel" class="carousel slide shadow rounded overflow-hidden" data-bs-ride="carousel" style="max-width: 800px; margin: 0 auto;">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#travelCarousel" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#travelCarousel" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#travelCarousel" data-bs-slide-to="2"></button>
            </div>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="assets/mountain.jpg" class="d-block w-100" alt="Himalayas">
                    <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded">
                        <h5>Hiking in the Himalayas</h5>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="assets/beach.jpg" class="d-block w-100" alt="Beach">
                    <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded">
                        <h5>Sunset at Cox's Bazar</h5>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="assets/city.jpg" class="d-block w-100" alt="City">
                    <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded">
                        <h5>Exploring Kyoto</h5>
                    </div>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#travelCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#travelCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
                <span class="visually-hidden">Next</span>
